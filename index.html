<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Text Example</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
    	<h1>Handoff Email Builder</h1>
	    <form>
	        <input autocomplete="off" type="text" id="practice" placeholder="Practice name" style="width:270px">
    	    <input autocomplete="off" type="text" id="client" placeholder="Client name" style="width:270px">
    	    <div>
        	    <label>Closed won date:</label>
        	    <input autocomplete="off" type="date" id="closedWonDate">
    	    </div>
    	    <button type="button" id="proceduresToggle" class="proceduresToggleOff" style="display:block">The list of procedures HAS BEEN confirmed by the customer</button>
    	    <div id="services">
        	    <label>Quantity of Services:</label>
        	    <input type="number" id="serviceQuantity" value="10" style="width:50px">
    	    </div>
    	    <select name="pm" id="pm">
    	        <option selected disabled value="Select PM">Select PM</option>
                <option value="Becca Freeman">Becca Freeman</option>
                <option value="Jessica Wright">Jessica Wright</option>
            </select>
    	    <select name="csm" id="csm">
    	        <option selected disabled value="Select CSM">Select CSM</option>
	            <option value="Amanda Baugh">Amanda Baugh</option>
                <option value="Cassandra Wilson">Cassandra Wilson</option>
                <option value="Emily Kearley">Emily Kearley</option>
                <option value="Ernesto Valles">Ernesto Valles</option>
                <option value="Isaiah Pointer">Isaiah Pointer</option>
                <option value="Isiah Flora">Isiah Flora</option>
                <option value="Jon Ketchum">Jon Ketchum</option>
                <option value="Luis Morabito">Luis Morabito</option>                    
                <option value="Samantha Garrison">Samantha Garrison</option>
                <option value="Sam Preston">Sam Preston</option>
                <option value="Tjay Davenport">Tjay Davenport</option>
            </select>
	    </form>
        <hr>
        <button class="copyButton" id="copyButton">Copy Subject Line</button>
        <p id="emailSubject"></p>
        <button class="copyButton" id="copyButton2">Copy Email Body</button>
        <p id="emailBody"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
